<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Dashboard — Obsidian Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1ec;
  --bg-alt:#ece8e1;
  --text:#1c1b18;
  --text-muted:#706b64;
  --text-dim:#8f8a82;
  --border:#d0cbc3;
  --accent:#9d5b3a;
  --accent-light:#c4886a;
  --accent-subtle:#efe4dc;
  --green:#4a7c59;
  --amber:#a67c3e;
  --red:#9e4d4d;
  --blue:#4a6f8a;
  --tag-bg:#e2dcd3;
  --card-bg:#fffffff2;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --radius:10px;
  --font-display:'DM Serif Display', Georgia, serif;
  --font-sans:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1b18;
    --bg-alt:#252320;
    --text:#e6e2db;
    --text-muted:#9e9a92;
    --text-dim:#6b6862;
    --border:#3a3732;
    --accent:#c4886a;
    --accent-subtle:#2d2823;
    --green:#6daa7e;
    --amber:#c49a5c;
    --red:#b86a6a;
    --blue:#6a8fa8;
    --tag-bg:#2d2a26;
    --card-bg:#252320f2;
    --shadow:0 1px 3px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.15);
  }
}
html{font-size:clamp(14px,1vw+10px,16px)}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* layout */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{
  background:var(--bg-alt);
  border-right:1px solid var(--border);
  padding:2rem 1.25rem;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:1.75rem;
}
.main{padding:2.5rem 3rem;max-width:1200px}

/* heading hierarchy */
h1{font-family:var(--font-display);font-size:1.75rem;font-weight:400;letter-spacing:-.01em;line-height:1.2}
h1 small{display:block;font-family:var(--font-sans);font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-top:.25rem}
h2{font-family:var(--font-display);font-size:1.3rem;font-weight:400;margin-bottom:.75rem;color:var(--text)}
h2 .note{font-family:var(--font-sans);font-size:.72rem;font-weight:400;color:var(--text-muted)}

/* stat blocks */
.stat-group{display:flex;flex-direction:column;gap:.5rem}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;font-size:.85rem;padding:.15rem 0}
.stat-row .label{color:var(--text-muted)}
.stat-row .value{font-weight:600;font-variant-numeric:tabular-nums}
.stat-row.double .value{font-size:1.8rem;font-family:var(--font-display);font-weight:400;color:var(--accent)}
.section-head{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:.5rem}

/* tag cloud */
.tag-cloud{display:flex;flex-wrap:wrap;gap:.35rem}
.tag{
  font-size:.72rem;padding:.2rem .55rem;border-radius:4px;
  background:var(--tag-bg);color:var(--text-muted);cursor:pointer;
  transition:all .12s;white-space:nowrap;
  border:1px solid transparent;
}
.tag:hover{background:var(--accent);color:white;border-color:var(--accent)}
.tag.active{background:var(--accent);color:white;border-color:var(--accent)}
.tag:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tag .count{font-size:.65rem;margin-left:.2rem;opacity:.7}

/* folder list */
.folder-list{display:flex;flex-direction:column;gap:.25rem}
.folder-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:.3rem .5rem;border-radius:4px;cursor:pointer;font-size:.82rem;
  transition:all .1s;border:1px solid transparent;
}
.folder-item:hover{background:var(--tag-bg)}
.folder-item.active{background:var(--accent-subtle);color:var(--accent);font-weight:500}
.folder-item:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.folder-item .count{font-size:.7rem;color:var(--text-dim);background:var(--tag-bg);padding:.1rem .4rem;border-radius:3px}
.folder-item.active .count{background:var(--accent);color:white}

/* search */
.search-bar{display:flex;gap:.75rem;margin-bottom:2rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{
  width:100%;padding:.65rem 1rem .65rem 2.5rem;
  border:1px solid var(--border);border-radius:8px;
  background:var(--card-bg);color:var(--text);font-size:.9rem;
  outline:none;transition:border-color .15s,box-shadow .15s;
  font-family:var(--font-sans);
  -webkit-appearance:none;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
.search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:1rem;height:1rem;color:var(--text-dim);pointer-events:none}
.filter-group{display:flex;gap:.35rem;flex-wrap:wrap}
.filter-btn{
  padding:.45rem .85rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;
  font-family:var(--font-sans);transition:all .1s;font-weight:500;
}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-subtle)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.filter-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* section spacing */
.section{margin-bottom:2.5rem}

/* page list table */
.page-list{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card-bg)}
.page-row{
  display:grid;grid-template-columns:220px 1fr 90px;
  gap:.75rem;padding:.55rem 1rem;
  border-bottom:1px solid var(--border);
  transition:background .1s;align-items:center;
}
.page-row:last-child{border-bottom:0}
.page-row:hover{background:var(--bg-alt)}
.page-row .name{font-weight:500;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-row .name .folder-badge{
  display:inline-block;font-size:.6rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;padding:.1rem .35rem;border-radius:3px;margin-right:.4rem;
}
.page-row .name .folder-badge.concepts{background:#e2dcd3;color:#6b6760}
.page-row .name .folder-badge.entities{background:#dce8e3;color:#3d6b54}
.page-row .name .folder-badge.misc{background:#e6dde4;color:#6a5060}
.page-row .name .folder-badge.sources{background:#e0dcd8;color:#6b6760}
.page-row .name .folder-badge.schema{background:#dde3e8;color:#4a6f8a}
.page-row .summ{font-size:.78rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-row .updated{font-size:.72rem;color:var(--text-dim);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}

/* stale badges */
.stale-badge{font-size:.65rem;padding:.1rem .4rem;border-radius:3px;font-weight:600;white-space:nowrap}
.stale-badge.hot{background:var(--accent-subtle);color:var(--accent)}
.stale-badge.warm{background:#ede4d6;color:var(--amber)}
.stale-badge.cold{background:#e2e0dc;color:#8a8680}
@media(prefers-color-scheme:dark){
  .stale-badge.warm{background:#3a3328;color:var(--amber)}
  .stale-badge.cold{background:#2d2b28;color:#7a7670}
}

/* card grids */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem}
.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.75rem}

.card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;transition:all .15s;
}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.card .card-title{font-weight:600;font-size:.9rem;margin-bottom:.25rem}
.card .card-title .folder-badge{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:.1rem .35rem;border-radius:3px;margin-right:.35rem}
.card .card-summ{font-size:.78rem;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;font-size:.7rem;color:var(--text-dim)}

/* empty state */
.empty-state{padding:2rem;text-align:center;color:var(--text-dim);font-size:.9rem;border:1px dashed var(--border);border-radius:var(--radius)}

/* responsive */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--border);padding:1.5rem 1rem}
  .main{padding:1.5rem 1rem}
  .page-row{grid-template-columns:1fr;gap:.2rem;padding:.5rem .75rem}
  .page-row .updated{text-align:left;margin-top:.15rem}
  .recent-grid{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr}
}

/* entrance animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-list,.card-grid,.recent-grid{animation:fadeIn .35s ease-out}
</style>
</head>

<a href="#mainContent" style="position:absolute;left:-9999px;top:0;z-index:999;padding:.5rem 1rem;background:var(--accent);color:white;border-radius:0 0 4px 0">Skip to content</a>

<div class="app" role="application" aria-label="Wiki Dashboard">
<aside class="sidebar" aria-label="Vault overview and navigation">
  <header>
    <h1>Wiki&nbsp;Dashboard <small>Obsidian Vault</small></h1>
  </header>

  <section aria-label="Vault statistics">
    <div class="section-head" aria-hidden="true">Overview</div>

      <div class="stat-row double"><span class="label">Total Pages</span><span class="value" id="statTotal" aria-live="polite">—</span></div>

      <div class="stat-row"><span class="label">Misc</span><span class="value" id="statMisc">—</span></div>
      <div class="stat-row"><span class="label">Sources</span><span class="value" id="statSources">—</span></div>
      <div class="stat-row"><span class="label">Unique Tags</span><span class="value" id="statTags">—</span></div>

  </section>

  <nav aria-label="Folder navigation">

    <div class="folder-list" id="folderList" role="listbox" aria-label="Select folder"></div>
  </nav>

  <section aria-label="Tag filter">
    <div class="section-head" aria-hidden="true">Top Tags</div>
    <div class="tag-cloud" id="tagCloud" role="listbox" aria-label="Filter by tag"></div>
  </section>
</aside>

<main class="main" id="mainContent" tabindex="-1">
  <div class="search-bar" role="search">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="searchInput" placeholder="Search pages by name, tag, or summary…" aria-label="Search all pages">
    </div>
    <div class="filter-group" role="tablist" aria-label="Filter by folder">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="concepts" role="tab" aria-selected="false">Concepts</button>
      <button class="filter-btn" data-filter="entities" role="tab" aria-selected="false">Entities</button>
      <button class="filter-btn" data-filter="misc" role="tab" aria-selected="false">Misc</button>
      <button class="filter-btn" data-filter="sources" role="tab" aria-selected="false">Sources</button>
    </div>
  </div>

  <section aria-labelledby="recent-heading">
    <h2 id="recent-heading">Recently Updated <span class="note">— last 20</span></h2>
    <div class="recent-grid" id="recentGrid"></div>
  </section>

  <section aria-labelledby="stale-heading">
    <h2 id="stale-heading">Stale Pages <span class="note">— untouched 30+ days</span></h2>
    <div class="card-grid" id="staleGrid"></div>
  </section>

  <section aria-labelledby="all-heading">
    <h2 id="all-heading">All Pages <span class="note" id="resultCount"></span></h2>
    <div class="page-list" id="pageList" role="list" aria-label="Filtered page list"></div>
  </section>
</main>
</div>

// ── Stats ──
const byFolder = {};
const tagCount = {};
DATA.forEach(p => {
  byFolder[p.f] = (byFolder[p.f] || 0) + 1;
  (p.g || []).forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; });
});

document.getElementById('statTotal').textContent = DATA.length.toLocaleString();
document.getElementById('statConcepts').textContent = (byFolder.concepts || 0).toLocaleString();
document.getElementById('statEntities').textContent = (byFolder.entities || 0).toLocaleString();
document.getElementById('statMisc').textContent = (byFolder.misc || 0).toLocaleString();
document.getElementById('statSources').textContent = (byFolder.sources || 0).toLocaleString();
document.getElementById('statTags').textContent = Object.keys(tagCount).length.toLocaleString();

// ── Folder Navigation ──
const folderEl = document.getElementById('folderList');
const FOLDER_NAMES = {concepts:'Concepts',entities:'Entities',misc:'Misc',sources:'Sources',schema:'Schema'};

Object.entries(byFolder).sort().forEach(([f, c]) => {
  const d = document.createElement('button');
  d.className = 'folder-item' + (f === 'concepts' ? ' active' : '');
  d.dataset.folder = f;
  d.role = 'option';
  d.setAttribute('aria-selected', f === 'concepts' ? 'true' : 'false');
  d.innerHTML = `<span>${FOLDER_NAMES[f] || f}</span><span class="count">${c}</span>`;
  d.addEventListener('click', () => setFolderFilter(f));
  d.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); setFolderFilter(f); }});
  folderEl.appendChild(d);
});

// ── Tag Cloud ──
const topTags = Object.entries(tagCount).sort((a,b) => b[1]-a[1]).slice(0, 40);
const cloudEl = document.getElementById('tagCloud');
topTags.forEach(([t, c]) => {
  const s = document.createElement('button');
  s.className = 'tag';
  s.role = 'option';
  s.setAttribute('aria-selected', 'false');
  s.innerHTML = `${t} <span class="count">${c}</span>`;
  s.addEventListener('click', () => setTagFilter(t, s));
  s.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); setTagFilter(t, s); }});
  cloudEl.appendChild(s);
});

// ── State ──
let currentFilter = 'all';
let currentTag = '';
let searchTerm = '';

const searchInput = document.getElementById('searchInput');
const filterBtns = document.querySelectorAll('.filter-btn');
const resultCount = document.getElementById('resultCount');

function folderBadge(f) {
  const cls = f === 'concepts' ? 'concepts' : f === 'entities' ? 'entities' : f === 'misc' ? 'misc' : f === 'sources' ? 'sources' : '';
  return `<span class="folder-badge ${cls}">${(FOLDER_NAMES[f]||f).slice(0,4)}</span>`;
}

function staleLabel(days) {
  if (!days || days > 365) return '';
  if (days <= 1) return `<span class="stale-badge hot">${days}d ago</span>`;
  if (days <= 7) return `<span class="stale-badge warm">${days}d ago</span>`;
  return `<span class="stale-badge cold">${days}d</span>`;
}

// ── Filtering ──
function filterPages() {
  return DATA.filter(p => {
    if (currentFilter !== 'all' && p.f !== currentFilter) return false;
    if (currentTag && !(p.g || []).includes(currentTag)) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      return p.t.toLowerCase().includes(q)
        || p.s.toLowerCase().includes(q)
        || (p.z || '').toLowerCase().includes(q)
        || (p.g || []).some(t => t.toLowerCase().includes(q));
    }
    return true;
  });
}

function sortPages(pages) {
  return [...pages].sort((a, b) => a.t.localeCompare(b.t));
}

function render() {
  const filtered = filterPages();
  resultCount.textContent = `— ${filtered.length} of ${DATA.length}`;
  renderAllPages(filtered);
}

function renderAllPages(pages) {
  const el = document.getElementById('pageList');
  if (!pages.length) {
    el.innerHTML = '<div class="empty-state">No pages match your filters. Try adjusting the search or folder filter above.</div>';
    return;
  }
  el.innerHTML = sortPages(pages).map(p => `
    <div class="page-row" role="listitem">
      <div class="name">${folderBadge(p.f)}${p.t}</div>
      <div class="summ" title="${(p.z||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${p.z || ''}</div>
      <div class="updated">${p.u ? p.u.slice(0,10) : ''}</div>
    </div>
  `).join('');
}

function setFolderFilter(f) {
  currentFilter = f;
  currentTag = '';
  // update folder items
  document.querySelectorAll('.folder-item').forEach(e => {
    e.classList.toggle('active', e.dataset.folder === f);
    e.setAttribute('aria-selected', e.dataset.folder === f ? 'true' : 'false');
  });
  // clear tag cloud selection
  document.querySelectorAll('.tag-cloud .tag').forEach(e => {
    e.classList.remove('active');
    e.setAttribute('aria-selected', 'false');
  });
  // update filter buttons to match
  filterBtns.forEach(b => {
    const isActive = b.dataset.filter === f;
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  render();
}

function setTagFilter(t, btn) {
  currentTag = currentTag === t ? '' : t;
  currentFilter = 'all';
  // toggle selected tag
  document.querySelectorAll('.tag-cloud .tag').forEach(e => {
    const isActive = e === btn && currentTag !== '';
    e.classList.toggle('active', isActive);
    e.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  // clear folder selection
  document.querySelectorAll('.folder-item').forEach(e => {
    e.classList.remove('active');
    e.setAttribute('aria-selected', 'false');
  });
  // reset filter buttons
  filterBtns.forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
    b.setAttribute('aria-selected', b.dataset.filter === 'all' ? 'true' : 'false');
  });
  render();
}

// ── Filter Buttons ──
filterBtns.forEach(b => {
  b.addEventListener('click', () => setFolderFilter(b.dataset.filter));
  b.addEventListener('keydown', e => {
    if(e.key==='Enter'||e.key===' ') { e.preventDefault(); setFolderFilter(b.dataset.filter); }
  });
});

// ── Search ──
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = searchInput.value;
    render();
  }, 120);
});

// ── Recently Updated ──
const now = new Date('2026-07-01T03:34:00Z');
const recent = DATA.filter(p => p.u).sort((a,b) => b.u.localeCompare(a.u)).slice(0, 20);
document.getElementById('recentGrid').innerHTML = recent.map(p => {
  const upd = new Date(p.u + (p.u.includes('T') ? 'Z' : 'T00:00:00Z'));
  const days = Math.floor((now - upd) / 86400000);
  return `<div class="card">
    <div class="card-title">${folderBadge(p.f)}${p.t}</div>
    <div class="card-summ">${p.z || ''}</div>
    <div class="card-meta"><span>${p.u.slice(0,10)}</span>${staleLabel(days)}</div>
  </div>`;
}).join('');

// ── Stale Pages ──
const stale = DATA
  .filter(p => p.u && p.f !== 'sources')
  .map(p => ({ ...p, _days: Math.floor((now - new Date(p.u + (p.u.includes('T') ? 'Z' : 'T00:00:00Z'))) / 86400000) }))
  .filter(p => p._days > 30)
  .sort((a,b) => b._days - a._days)
  .slice(0, 20);
document.getElementById('staleGrid').innerHTML = stale.length
  ? stale.map(p => `<div class="card">
    <div class="card-title">${folderBadge(p.f)}${p.t}</div>
    <div class="card-summ">${p.z || ''}</div>
    <div class="card-meta"><span>Last updated ${p.u.slice(0,10)}</span><span class="stale-badge cold">${p._days}d untouched</span></div>
  </div>`).join('')
  : '<div class="empty-state">No stale pages — everything has been updated recently!</div>';

// ── Initial Render ──
render();
</script>
</body>
</html>
